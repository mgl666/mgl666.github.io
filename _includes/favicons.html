{% capture avatar_icon %}{{ '/assets/img/avatar.png' | relative_url }}{% endcapture %}

<link rel="icon" type="image/png" href="{{ avatar_icon }}" sizes="96x96">
<link rel="icon" type="image/png" href="{{ avatar_icon }}">
<link rel="shortcut icon" href="{{ avatar_icon }}">
<link rel="apple-touch-icon" href="{{ avatar_icon }}">
{% if site.pwa.enabled %}
  {% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest">
{% endif %}
