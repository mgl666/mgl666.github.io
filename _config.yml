# 主题
theme: jekyll-theme-chirpy

# 站点默认语言与时区
lang: en
timezone: Asia/Shanghai

# 站点标题与描述（侧边栏标题/副标题、SEO 描述）
title: Guanlong Ma
tagline: 记录科研、代码与思考的生长轨迹
description: A minimal, responsive and feature-rich Jekyll theme for technical writing.

# 站点地址配置
# - 个人主页仓库（username.github.io）通常 baseurl 为空
# - 项目页仓库（username.github.io/repo）时 baseurl 一般写 /repo
url: "https://mgl666.github.io"
baseurl: ""

# GitHub 用户名（用于侧边栏链接等）
github:
  username: mgl666

# 作者与联系方式
social:
  name: Guanlong Ma
  email: guanlongma@foxmail.com
  links:
    - https://github.com/mgl666

# 媒体资源配置
# - cdn: 静态资源 CDN 前缀
# - avatar: 头像路径（会拼接到 cdn 或站点路径）
cdn: ""
avatar: "/assets/img/avatar.jpg"
social_preview_image:

# 文章目录开关（TOC）与主题模式
# theme_mode 留空表示跟随系统，可在页面左下角切换明暗
toc: true
theme_mode:

# 文章浏览量服务提供商（未启用可留空）
pageviews:
  provider:

# 网站分析（Firebase 对应 Google Analytics/GA4 的 Measurement ID）
analytics:
  google:
    id: "G-W5REXERJQF"

# Firebase 配置（用于主页点赞）
firebase:
  like:
    enabled: true
    api_key: "AIzaSyA7bIljBAdsiXMDXeJui6ww_7uLbGznl5w"
    auth_domain: "mgl666web.firebaseapp.com"
    project_id: "mgl666web"
    app_id: "1:73687187290:web:8774582a8ffd7e3cf8bd63"
    # 以下三项可选，但建议都填写为 Firebase 控制台中的值
    measurement_id: "G-W5REXERJQF"
    storage_bucket: "mgl666web.firebasestorage.app"
    messaging_sender_id: "73687187290"
    # Firestore 文档位置和字段名（全站统一计数）
    collection: "site_metrics"
    document: "homepage"
    field: "likes"

# PWA 开关（是否支持安装到桌面与离线缓存）
pwa:
  enabled: false
  cache:
    enabled: true
    deny_paths: []

# 首页分页数量：第一页单独使用较小容量，后续页面使用 paginate
home_first_page_posts: 5
paginate: 10

# Markdown 与代码高亮设置
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# 自定义集合：侧边栏 tabs 页面
collections:
  tabs:
    output: true
    sort_by: order

# 默认 front matter（给文章/草稿/tabs 自动补充字段）
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# SCSS 编译模式
sass:
  style: compressed

# HTML 压缩设置
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# GitHub Pages 所需插件
plugins:
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap

# 构建时忽略的文件/目录
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - _posts/exampl
  - _posts/example
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# 分类归档页面路由（只保留 categories）
jekyll-archives:
  enabled: [categories]
  layouts:
    category: category
  permalinks:
    category: /categories/:name/
