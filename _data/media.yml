# 媒体扩展名到 MIME 类型的映射
# 供内置音视频嵌入组件识别资源类型使用
- extension: mp3
  mime_type: mpeg
- extension: mov
  mime_type: quicktime
- extension: avi
  mime_type: x-msvideo
- extension: mkv
  mime_type: x-matroska
- extension: ogv
  mime_type: ogg
- extension: weba
  mime_type: webm
- extension: 3gp
  mime_type: 3gpp
- extension: 3g2
  mime_type: 3gpp2
- extension: mid
  mime_type: midi
